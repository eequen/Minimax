<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical AI Combat — Minimax Alpha-Beta Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a1628;color:#fff;min-height:100vh}
.screen{padding:22px}
.card{background:#132952;border:1px solid #1e3a6e;border-radius:12px;padding:16px}
.hp-bg{background:#060f1e;border-radius:6px;height:13px;overflow:hidden;margin:10px 0}
.hp-fill{height:100%;border-radius:6px;transition:width .5s ease,background .5s ease}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;text-align:center}
.mb{margin-bottom:14px}
.badge{font-size:11px;padding:2px 9px;border-radius:999px;display:inline-block;margin-right:4px}
.move-btn{background:#1a3666;border:1.5px solid #2b9fe8;border-radius:10px;color:#fff;cursor:pointer;padding:12px 6px;text-align:center;width:100%;transition:background .12s,opacity .12s}
.move-btn:hover:not(:disabled){background:#1f4080}
.move-btn:disabled{background:#0f1e38;border-color:#1e3a6e;color:#3a5070;cursor:not-allowed;opacity:.6}
.stat-num{font-size:21px;font-weight:700;line-height:1.2}
.stat-lbl{font-size:11px;color:#7b9bc8;margin-top:2px}
.log-wrap{height:116px;overflow-y:auto;padding-right:2px}
.log-entry{font-size:13px;padding:3px 8px;border-radius:4px;margin-bottom:3px}
.big-btn{border:none;border-radius:9px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;padding:14px 52px;background:#2b9fe8}
.big-btn:hover{background:#1f8fd0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.thinking{animation:pulse .85s infinite}
@keyframes flash{0%{background:rgba(255,255,255,.2)}100%{background:transparent}}
.log-wrap::-webkit-scrollbar{width:4px}
.log-wrap::-webkit-scrollbar-track{background:transparent}
.log-wrap::-webkit-scrollbar-thumb{background:#1e3a6e;border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const MAX=100, DEPTH=5, BDMG=22, BHEAL=28, BMULT=1.5, DMULT=0.6, BDUR=3;

// ── State ──────────────────────────────────────────────────────────────────
let G, turn, log, aiInfo, round, winner;

function init(){
  G={aiHP:MAX,plHP:MAX,aiBuffT:0,plBuffT:0,aiDebT:0,plDebT:0};
  turn="player"; log=[{m:"⚔️  Battle start! Choose your action.",t:"sys",id:0}];
  aiInfo=null; round=1; winner=null;
}

// ── Minimax ────────────────────────────────────────────────────────────────
function heur(s){
  if(s.aiHP<=0) return -9999;
  if(s.plHP<=0) return 9999;
  return (s.aiHP-s.plHP)*2+(s.aiBuffT-s.plBuffT+s.plDebT-s.aiDebT)*12;
}

function sim(s,move,who){
  const n={...s},ai=who==="ai";
  if(move==="attack"){
    let d=BDMG;
    if(ai){if(n.aiBuffT>0)d=Math.round(d*BMULT);if(n.aiDebT>0)d=Math.round(d*DMULT);n.plHP=Math.max(0,n.plHP-d);}
    else  {if(n.plBuffT>0)d=Math.round(d*BMULT);if(n.plDebT>0)d=Math.round(d*DMULT);n.aiHP=Math.max(0,n.aiHP-d);}
  }else if(move==="heal"){
    if(ai)n.aiHP=Math.min(MAX,n.aiHP+BHEAL);else n.plHP=Math.min(MAX,n.plHP+BHEAL);
  }else if(move==="buff"){
    if(ai)n.aiBuffT=BDUR;else n.plBuffT=BDUR;
  }else{
    if(ai)n.plDebT=BDUR;else n.aiDebT=BDUR;
  }
  if(!(move==="buff"  && ai )) n.aiBuffT=Math.max(0,n.aiBuffT-1);
  if(!(move==="buff"  &&!ai )) n.plBuffT=Math.max(0,n.plBuffT-1);
  if(!(move==="debuff"&&!ai )) n.aiDebT =Math.max(0,n.aiDebT -1);
  if(!(move==="debuff"&& ai )) n.plDebT =Math.max(0,n.plDebT -1);
  return n;
}

const MOVES=["attack","heal","buff","debuff"];

function mmx(s,depth,isMax,a,b,st){
  st.nodes++;
  if(depth===0||s.aiHP<=0||s.plHP<=0) return heur(s);
  if(isMax){
    let best=-Infinity;
    for(const m of MOVES){
      const v=mmx(sim(s,m,"ai"),depth-1,false,a,b,st);
      if(v>best)best=v;if(best>a)a=best;if(b<=a){st.pruned++;break;}
    }
    return best;
  }else{
    let best=Infinity;
    for(const m of MOVES){
      const v=mmx(sim(s,m,"player"),depth-1,true,a,b,st);
      if(v<best)best=v;if(best<b)b=best;if(b<=a){st.pruned++;break;}
    }
    return best;
  }
}

function bestMove(s){
  const st={nodes:0,pruned:0};
  let bm="attack",bs=-Infinity;
  for(const m of MOVES){
    const v=mmx(sim(s,m,"ai"),DEPTH-1,false,-Infinity,Infinity,st);
    st.nodes++;
    if(v>bs){bs=v;bm=m;}
  }
  return{move:bm,score:bs,...st};
}

// ── Helpers ────────────────────────────────────────────────────────────────
const rnd=(b,v)=>b-v+Math.floor(Math.random()*(v*2+1));
const hpC=p=>p>.5?"#22c55e":p>.25?"#eab308":"#ef4444";
const fmt=n=>n.toLocaleString();
function addLog(m,t){log.push({m,t,id:Math.random()});if(log.length>40)log.shift();}
const moveLabel={attack:"⚔️ Strike",heal:"💊 Heal",buff:"⚡ Rage",debuff:"🌀 Curse"};

function hpBar(hp){
  const p=hp/MAX;
  return `<div class="hp-bg"><div class="hp-fill" style="width:${Math.round(p*100)}%;background:${hpC(p)}"></div></div>`;
}

function badges(bt,dt,bn,dn){
  let h="";
  if(bt>0)h+=`<span class="badge" style="background:#1a3a1a;color:#22c55e;border:1px solid #22c55e">⚡ ${bn} (${bt})</span>`;
  if(dt>0)h+=`<span class="badge" style="background:#3a1a1a;color:#ef4444;border:1px solid #ef4444">💀 ${dn} (${dt})</span>`;
  if(!bt&&!dt)h+=`<span style="color:#3a5070;font-size:12px">No effects</span>`;
  return h;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");

  // ── START SCREEN ──
  if(turn==="start"){
    root.innerHTML=`
    <div class="screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:98vh">
      <div style="color:#7b9bc8;font-size:11px;letter-spacing:3px;margin-bottom:8px;text-transform:uppercase">Design &amp; Analysis of Algorithms</div>
      <h1 style="font-size:38px;font-weight:800;margin:0 0 6px;text-align:center">Tactical AI Combat</h1>
      <div style="font-size:16px;color:#2b9fe8;margin-bottom:36px">Minimax Algorithm · Alpha-Beta Pruning · Depth ${DEPTH}</div>

      <div style="display:flex;gap:44px;margin-bottom:36px;align-items:center">
        <div class="card" style="text-align:center;padding:28px 40px">
          <div style="font-size:64px">🧙</div>
          <div style="color:#7eb8f7;font-weight:700;margin-top:8px;font-size:17px">HERO</div>
          <div style="color:#7b9bc8;font-size:12px">Controlled by you</div>
        </div>
        <div style="font-size:28px;color:#2b9fe8;font-weight:800">VS</div>
        <div class="card" style="text-align:center;padding:28px 40px;border-color:#4a1a1a">
          <div style="font-size:64px">🐉</div>
          <div style="color:#e74c3c;font-weight:700;margin-top:8px;font-size:17px">DRAGON</div>
          <div style="color:#7b9bc8;font-size:12px">Minimax AI — Depth ${DEPTH}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px;width:100%;max-width:620px">
        ${[
          {icon:"⚔️",n:"Strike",    d:`~${BDMG} base damage`},
          {icon:"💊",n:"Heal",      d:`+~${BHEAL} HP restored`},
          {icon:"⚡",n:"Power Up",  d:`ATK ×${BMULT} for ${BDUR} turns`},
          {icon:"🌀",n:"Weaken",    d:`Enemy ATK ×${DMULT} for ${BDUR} turns`},
        ].map(m=>`
          <div class="card" style="text-align:center;padding:14px 10px">
            <div style="font-size:28px">${m.icon}</div>
            <div style="font-weight:700;font-size:13px;margin-top:5px">${m.n}</div>
            <div style="font-size:11px;color:#7b9bc8;margin-top:3px">${m.d}</div>
          </div>`).join("")}
      </div>

      <button class="big-btn" onclick="startGame()">▶ Begin Battle</button>
    </div>`;
    return;
  }

  // ── GAME OVER SCREEN ──
  if(turn==="gameover"){
    const isV=winner==="player";
    const eff=aiInfo&&aiInfo.nodes>0?Math.round(aiInfo.pruned/aiInfo.nodes*100):0;
    const noMM=MOVES.length**DEPTH;
    root.innerHTML=`
    <div class="screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:98vh">
      <div style="font-size:80px;margin-bottom:14px">${isV?"🏆":"💀"}</div>
      <h1 style="font-size:52px;font-weight:800;color:${isV?"#22c55e":"#ef4444"};margin:0 0 8px">${isV?"VICTORY!":"DEFEAT"}</h1>
      <div style="color:#7b9bc8;margin-bottom:28px;font-size:15px">${isV?"You defeated the Dragon":"The Dragon defeated you"} after <strong style="color:#fff">${round}</strong> rounds.</div>
      ${aiInfo?`
      <div class="card mb" style="padding:22px 44px;text-align:center;width:100%;max-width:560px">
        <div style="color:#7b9bc8;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">📊 Final Minimax AI Performance</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px">
          <div><div class="stat-num">${fmt(aiInfo.nodes)}</div><div class="stat-lbl">Nodes Evaluated</div></div>
          <div><div class="stat-num" style="color:#22c55e">${fmt(aiInfo.pruned)}</div><div class="stat-lbl">Nodes Pruned</div></div>
          <div><div class="stat-num" style="color:#f4b942">${eff}%</div><div class="stat-lbl">Pruning Efficiency</div></div>
          <div><div class="stat-num" style="color:#2b9fe8">${DEPTH}</div><div class="stat-lbl">Search Depth</div></div>
        </div>
        <div style="margin-top:16px;color:#7b9bc8;font-size:12px">Without pruning, AI would evaluate up to <strong style="color:#fff">${fmt(noMM)}</strong> nodes per turn</div>
      </div>`:``}
      <button class="big-btn" onclick="startGame()">↩ Play Again</button>
    </div>`;
    return;
  }

  // ── COMBAT SCREEN ──
  const isThink=turn==="thinking", isP=turn==="player";
  const plPct=G.plHP/MAX, aiPct=G.aiHP/MAX;
  const eff=aiInfo&&aiInfo.nodes>0?Math.round(aiInfo.pruned/aiInfo.nodes*100):0;

  const btns=[
    {m:"attack",icon:"⚔️",n:"Strike",    d:`~${BDMG} damage`,        off:!isP},
    {m:"heal",  icon:"💊",n:"Heal",      d:`+~${BHEAL} HP`,           off:!isP},
    {m:"buff",  icon:"⚡",n:"Power Up",  d:G.plBuffT>0?`Active: ${G.plBuffT} turns left`:`ATK ×${BMULT} / ${BDUR} turns`, off:!isP||G.plBuffT>0},
    {m:"debuff",icon:"🌀",n:"Weaken",    d:`Enemy ×${DMULT} / ${BDUR} turns`, off:!isP},
  ];

  root.innerHTML=`
  <div class="screen">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="color:#7b9bc8;font-size:13px">Round <strong style="color:#fff">${round}</strong></div>
      <div style="color:#2b9fe8;font-size:12px;font-weight:600">Minimax · Alpha-Beta · Depth ${DEPTH}</div>
      <div class="${isThink?"thinking":""}" style="font-size:13px;font-weight:600;color:${isThink?"#f4b942":isP?"#22c55e":"#7b9bc8"}">
        ${isThink?"🤔 Dragon Analyzing...":isP?"⚔️ Your Turn":"↩ Waiting..."}
      </div>
    </div>

    <!-- Character Cards -->
    <div class="grid2 mb">
      <!-- Hero -->
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="font-size:44px">🧙</div>
          <div>
            <div style="color:#7eb8f7;font-weight:700;font-size:15px">HERO</div>
            <div style="font-size:24px;font-weight:700">${G.plHP} <span style="color:#7b9bc8;font-size:14px">/ ${MAX} HP</span></div>
          </div>
        </div>
        ${hpBar(G.plHP)}
        <div style="margin-top:6px">${badges(G.plBuffT,G.plDebT,"Buffed","Cursed")}</div>
      </div>
      <!-- Dragon -->
      <div class="card" style="border-color:#2a1a1a">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="font-size:44px">🐉</div>
          <div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:#e74c3c;font-weight:700;font-size:15px">DRAGON</span>
              <span style="font-size:10px;color:#7b9bc8;background:#1a2840;padding:2px 7px;border-radius:4px;border:1px solid #1e3a6e">Minimax AI</span>
            </div>
            <div style="font-size:24px;font-weight:700">${G.aiHP} <span style="color:#7b9bc8;font-size:14px">/ ${MAX} HP</span></div>
          </div>
        </div>
        ${hpBar(G.aiHP)}
        <div style="margin-top:6px">${badges(G.aiBuffT,G.aiDebT,"Enraged","Weakened")}</div>
      </div>
    </div>

    <!-- Move Buttons -->
    <div class="grid4 mb">
      ${btns.map(b=>`
        <button class="move-btn" onclick="playerAct('${b.m}')" ${b.off?"disabled":""}>
          <div style="font-size:28px;margin-bottom:5px">${b.icon}</div>
          <div style="font-weight:700;font-size:13px;margin-bottom:3px">${b.n}</div>
          <div style="font-size:11px;color:${b.off?"#2a4060":"#7b9bc8"}">${b.d}</div>
        </button>`).join("")}
    </div>

    <!-- AI Stats -->
    <div class="card mb" style="border-color:#1e3060">
      <div style="color:#7b9bc8;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">🧠 Minimax AI — Decision Stats</div>
      ${aiInfo?`
      <div class="grid5">
        <div><div class="stat-num">${fmt(aiInfo.nodes)}</div><div class="stat-lbl">Nodes Evaluated</div></div>
        <div><div class="stat-num" style="color:#22c55e">${fmt(aiInfo.pruned)}</div><div class="stat-lbl">Nodes Pruned</div></div>
        <div><div class="stat-num" style="color:#f4b942">${eff}%</div><div class="stat-lbl">Pruning Efficiency</div></div>
        <div><div class="stat-num" style="color:#2b9fe8">${DEPTH}</div><div class="stat-lbl">Search Depth</div></div>
        <div>
          <div style="font-size:15px;font-weight:700;color:#e74c3c;line-height:1.3">${moveLabel[aiInfo.move]||aiInfo.move}</div>
          <div class="stat-lbl">Chosen · Score: ${aiInfo.score}</div>
        </div>
      </div>`:`<div style="color:#3a5070;font-size:13px;font-style:italic">Waiting for first AI decision...</div>`}
    </div>

    <!-- Battle Log -->
    <div class="card" style="padding:12px">
      <div style="color:#7b9bc8;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Battle Log</div>
      <div class="log-wrap" id="log">
        ${log.map(e=>`
          <div class="log-entry" style="color:${
            e.t==="player"?"#7eb8f7":
            e.t==="ai"    ?"#f07070":
            e.t==="think" ?"#f4b942":
                           "#22c55e"
          }">${e.m}</div>`).join("")}
      </div>
    </div>
  </div>`;

  const l=document.getElementById("log");
  if(l) l.scrollTop=l.scrollHeight;
}

// ── Actions ────────────────────────────────────────────────────────────────
function startGame(){init();render();}

function playerAct(move){
  if(turn!=="player") return;
  let ns={...G}, msg="";

  if(move==="attack"){
    let d=rnd(BDMG,5);
    if(ns.plBuffT>0)d=Math.round(d*BMULT);
    if(ns.plDebT>0) d=Math.round(d*DMULT);
    ns.aiHP=Math.max(0,ns.aiHP-d);
    msg=`⚔️ Hero strikes Dragon for <strong>${d}</strong> damage!`;
  }else if(move==="heal"){
    const a=rnd(BHEAL,4);
    ns.plHP=Math.min(MAX,ns.plHP+a);
    msg=`💊 Hero heals for <strong>${a}</strong> HP!`;
  }else if(move==="buff"){
    if(ns.plBuffT>0) return;
    ns.plBuffT=BDUR;
    msg=`⚡ Hero channels power — ATK boosted for <strong>${BDUR}</strong> turns!`;
  }else{
    ns.aiDebT=BDUR;
    msg=`🌀 Hero weakens Dragon — Dragon ATK reduced for <strong>${BDUR}</strong> turns!`;
  }

  if(move!=="buff")   ns.plBuffT=Math.max(0,ns.plBuffT-1);
  ns.aiBuffT=Math.max(0,ns.aiBuffT-1);
  if(move!=="debuff") ns.aiDebT =Math.max(0,ns.aiDebT -1);
  ns.plDebT =Math.max(0,ns.plDebT -1);

  G=ns;
  addLog(msg,"player");

  if(G.aiHP<=0){
    winner="player"; turn="gameover";
    addLog("🏆 Dragon defeated! <strong>VICTORY!</strong>","sys");
    render(); return;
  }

  turn="thinking";
  addLog("🤔 Dragon analyzing the battlefield...","think");
  render();

  setTimeout(()=>{
    const res=bestMove(G);
    aiInfo=res;
    let ns2={...G}, aiMsg="";

    if(res.move==="attack"){
      let d=rnd(BDMG,5);
      if(ns2.aiBuffT>0)d=Math.round(d*BMULT);
      if(ns2.aiDebT>0) d=Math.round(d*DMULT);
      ns2.plHP=Math.max(0,ns2.plHP-d);
      aiMsg=`🔥 Dragon breathes fire for <strong>${d}</strong> damage!`;
    }else if(res.move==="heal"){
      const a=rnd(BHEAL,4);
      ns2.aiHP=Math.min(MAX,ns2.aiHP+a);
      aiMsg=`✨ Dragon regenerates <strong>${a}</strong> HP!`;
    }else if(res.move==="buff"){
      ns2.aiBuffT=BDUR;
      aiMsg=`💢 Dragon enrages — ATK boosted for <strong>${BDUR}</strong> turns!`;
    }else{
      ns2.plDebT=BDUR;
      aiMsg=`💀 Dragon curses the Hero — Hero ATK reduced for <strong>${BDUR}</strong> turns!`;
    }

    if(res.move!=="buff")   ns2.aiBuffT=Math.max(0,ns2.aiBuffT-1);
    ns2.plBuffT=Math.max(0,ns2.plBuffT-1);
    if(res.move!=="debuff") ns2.plDebT =Math.max(0,ns2.plDebT -1);
    ns2.aiDebT =Math.max(0,ns2.aiDebT -1);

    G=ns2;
    addLog(aiMsg,"ai");
    round++;

    if(G.plHP<=0){
      winner="ai"; turn="gameover";
      addLog("💀 Hero falls! Dragon wins!","sys");
      render(); return;
    }

    turn="player";
    addLog("Your turn — choose your action.","sys");
    render();
  },1300);
}

// ── Boot ────────────────────────────────────────────────────────────────────
turn="start";
render();
</script>
</body>
</html>
